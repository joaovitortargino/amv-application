<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Ordem de Serviço - AMV</title>

    <style type="text/css">
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #333;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f8;
            font-size: 13px;
        }

        .clearfix {
            clear: both;
        }

        .page-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
        }

        .header {
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header-logo {
            float: left;
            width: 50%;
        }

        .header-text {
            float: right;
            width: 50%;
            text-align: right;
        }

        .header-text .doc-type {
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
            letter-spacing: 2px;
            margin: 0;
        }

        .header-text .doc-date {
            margin-top: 5px;
            font-size: 12px;
            color: #7f8c8d;
            font-weight: bold;
        }

        .info-card {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 15px 20px;
            margin-bottom: 30px;
        }

        .info-section {
            float: left;
            width: 48%;
        }

        .info-section p {
            margin: 5px 0;
            font-size: 13px;
        }

        .info-section strong {
            color: #2c3e50;
            display: inline-block;
            width: 70px;
        }

        table.data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        table.data-table th, table.data-table td {
            border: 1px solid #ddd;
            padding: 12px 10px;
            text-align: left;
        }

        table.data-table th {
            background-color: #2c3e50;
            color: #ffffff;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            text-align: center;
        }

        table.data-table tbody tr:nth-child(even) {
            background-color: #fcfcfc;
        }

        .td-center { text-align: center !important; }
        .td-right { text-align: right !important; }

        .observations {
            background-color: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 30px;
            font-size: 12px;
            color: #856404;
        }

        .observations strong {
            display: block;
            margin-bottom: 5px;
        }

        .totals-container {
            margin-bottom: 50px;
        }

        table.totals-table {
            width: 320px;
            border-collapse: collapse;
            float: right;
        }

        table.totals-table td {
            padding: 8px 10px;
            font-size: 14px;
        }

        table.totals-table tr.total-row td {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            border-top: 2px solid #2c3e50;
            padding-top: 15px;
        }

        .footer-container {
            text-align: center;
            margin-top: 60px;
            page-break-inside: avoid;
            clear: both;
        }

        .signature-line {
            border-bottom: 1px solid #333;
            width: 350px;
            margin: 0 auto 10px auto;
        }

        .signature-text {
            font-size: 12px;
            font-weight: bold;
            color: #333;
        }

        .company-info {
            margin-top: 40px;
            font-size: 11px;
            color: #7f8c8d;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .company-info strong {
            color: #333;
        }

        @media print {
            body { background-color: #ffffff; padding: 0; }
            .page-container { border: none; margin: 0; padding: 0; max-width: 100%; }
            .info-card { border: 1px solid #ccc; }
            .header { border-bottom: 2px solid #333; }
            table.data-table th { background-color: #eee; color: #333; }
            table.data-table { border: 1px solid #ccc; }
        }
    </style>
</head>
<body>

<div class="page-container">

    <div class="header">
        <div class="header-logo" th:if="${logo != null}">
            <img th:src="'data:image/png;base64,' + ${logo}" style="max-height: 80px; border-radius: 12px;" />
        </div>
        <div class="header-text">
            <h2 class="doc-type">ORÇAMENTO</h2>
            <div class="doc-date">
                DATA: <span th:text="${#temporals.format(os.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
            </div>
            <div class="doc-date">
                PEDIDO Nº: <span style="color: #2c3e50;" th:text="${os.osNumber}"></span>
            </div>
        </div>
        <div class="clearfix"></div> </div>

    <div class="info-card">
        <div class="info-section">
            <p><strong>CLIENTE:</strong> <span th:text="${client.name}"></span></p>
            <p><strong>DOC:</strong> <span th:text="${client.document}"></span></p>
        </div>
        <div class="info-section" style="float: right;">
            <p><strong>VEÍCULO:</strong> <span th:text="${os.vehicle.model}"></span></p>
            <p><strong>PLACA:</strong> <span th:text="${os.vehicle.plate}"></span></p>
        </div>
        <div class="clearfix"></div> </div>

    <table class="data-table">
        <thead>
        <tr>
            <th width="10%">Mec.</th>
            <th width="10%">QTD.</th>
            <th width="40%">DESCRIÇÃO DO SERVIÇO</th>
            <th width="15%">V. UNIT.</th>
            <th width="10%">DESC.</th>
            <th width="15%">TOTAL</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${os.items}">
            <td class="td-center" th:text="${item.mechanicCode != null ? item.mechanicCode : '-'}">0</td>
            <td class="td-center" th:text="${item.amount}"></td>
            <td th:text="${item.name}"></td>
            <td class="td-right" th:text="${#numbers.formatCurrency(item.unitValue)}"></td>
            <td class="td-right" th:text="${#numbers.formatCurrency(item.discount)}"></td>
            <td class="td-right" th:text="${#numbers.formatCurrency(item.total)}"></td>
        </tr>
        </tbody>
    </table>

    <div class="observations" th:if="${os.observations != null and !os.observations.isEmpty()}">
        <strong>OBSERVAÇÕES:</strong>
        <span th:text="${os.observations}"></span>
    </div>

    <div class="totals-container">
        <table class="totals-table">
            <tr>
                <td>Subtotal:</td>
                <td class="td-right" th:text="${#numbers.formatCurrency(os.totals.subtotal)}"></td>
            </tr>
            <tr>
                <td>Descontos:</td>
                <td class="td-right" style="color: #e74c3c;" th:text="${#numbers.formatCurrency(os.totals.descont)}"></td>
            </tr>
            <tr class="total-row">
                <td>TOTAL:</td>
                <td class="td-right" th:text="${#numbers.formatCurrency(os.totals.total)}"></td>
            </tr>
        </table>
        <div class="clearfix"></div> </div>

    <div class="footer-container">
        <div class="signature-line"></div>
        <div class="signature-text">ASSINATURA DO CLIENTE POR EXTENSO</div>

        <div class="company-info">
            <strong>AMV SERVIÇO DE MECANICA LTDA</strong><br />
            Avenida Marginal Luiz Guapo, 855 | Contato: <strong>(17) 99162-2421</strong>
        </div>
    </div>

</div>

</body>
</html>
